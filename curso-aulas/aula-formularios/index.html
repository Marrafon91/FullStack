<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios</title>
</head>
<body>
    <header>
        <nav>
            <h1>Loja Top</h1>
        </nav>
    </header>

    <main>
        <section>
            <h2>Cadastro</h2>

            <form action="obrigado.html">
                
                <div>
                    <label for="ctrl-name">Nome</label>
                    <input id="ctrl-name" name="name" type="text" placeholder="Digite o seu nome">
                </div>

                <div>
                    <label for="ctrl-email">Email</label>
                    <input id="ctrl-email" name="email" type="email" placeholder="Digite o seu email">
                </div>

                <div>
                    <label for="ctrl-password">Senha</label>
                    <input id="ctrl-password" name="password" type="password" placeholder="Digite a sua senha">
                </div>

                <div>
                    <label for="ctrl-city">Cidade</label>
                    <select name="city" id="ctrl-city">
                        <option value="1">São Paulo</option>
                        <option value="2">Belo Horizonte</option>
                        <option value="3">Recife</option>
                        <option value="4">Porto Alegre</option>
                    </select>
                </div>

                <div>
                    <label for="ctrl-level">Escolaridade</label>
                        <div id="ctrl-level">
                            <input type="radio" name="level" id="ctrl-level-1">
                            <label for="ctrl-level-1">Fundamental</label>

                            <input type="radio" name="level" id="ctrl-level-2">
                            <label for="ctrl-level-2">Médio</label>

                            <input type="radio" name="level" id="ctrl-level-3">
                            <label for="ctrl-level-3">Superior</label>
                        </div>
                </div>

                <div>
                    <label for="ctrl-lenguages">Linguagens que você conhece</label>
                    <div id="ctrl-lenguages">
                        <input type="checkbox" name="lenguages-1" id="ctrl-lenguages-java">
                        <label for="ctrl-lenguages-java">Java</label>

                        <input type="checkbox" name="lenguages-2" id="ctrl-lenguages-csharp">
                        <label for="ctrl-lenguages-csharp">C#</label>

                        <input type="checkbox" name="lenguages-3" id="ctrl-lenguages-js">
                        <label for="ctrl-lenguages-js">JavaScript</label>

                        <input type="checkbox" name="lenguages-4" id="ctrl-lenguages-Python">
                        <label for="ctrl-lenguages-Python">Python</label>

                    </div>
                </div>

                <input type="submit" value="Enviar">
                <input type="reset" value="Apagar tudo">
            </form>
        </section>
    </main>
    
</body>
</html>
