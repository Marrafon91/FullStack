<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DSViaCEP</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <header class="nav-container">
      <nav class="nav-main">
        <h1>DSViaCEP</h1>
        <div class="contact-link">contato</div>
      </nav>
    </header>

    <main>
      <section id="form-section" class="form-container">
        <div class="card-form">
          <div>
            <form name="newAddress">
              <div class="form-control">
                <label for="cep">CEP:</label>
                <input
                  type="text"
                  name="cep"
                  id="cep"
                  class="form-input"
                  placeholder="CEP"
                />
                <div class="error-message" data-error="cep"></div>
              </div>
              <div class="form-control">
                <label for="street">Logradouro:</label>
                <input
                  type="text"
                  name="street"
                  id="street"
                  placeholder="Logradouro"
                  class="form-input"
                  disabled
                />
              </div>
              <div class="form-control">
                <label for="number">Numero:</label>
                <input
                  type="text"
                  name="number"
                  id="number"
                  placeholder="Numero"
                  class="form-input"
                />
                <div class="error-message" data-error="number"></div>
              </div>
              <div class="form-control">
                <label for="city">Cidade:</label>
                <input
                  type="text"
                  name="city"
                  id="city"
                  placeholder="Cidade"
                  class="form-input"
                  disabled
                />
              </div>
              <div class="btn-container">
                <button name="btnSave" class="btn btn-left" type="submit">
                  Salvar
                </button>
                <button name="btnClear" class="btn btn-right" type="reset">
                  Limpar
                </button>
              </div>
            </form>
          </div>
        </div>
      </section>

      <section id="list-section" class="list-container">
        <div class="card-list-item">
          <h3>São Paulo</h3>
          <p class="address-line">
            Av. Paulista, 1000 - Bela Vista, São Paulo - SP
          </p>
          <p class="address-cep">11200-345</p>
        </div>
      </section>
    </main>
    <section id="modal-contact" class="modal-container">
      <div class="modal-box">
        <div class="modal-content">
          <p>https://github.com/Marrafon91</p>
        </div>
        <button id="modal-contact-close" class="btn">Fechar</button>
      </div>
    </section>

    <script type="module" src="/js/dsviacep.js"></script>
  </body>
</html>
